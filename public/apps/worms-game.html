<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vibe Worms - Masterpiece Edition</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; user-select: none; }
        #gameContainer { position: relative; width: 900px; height: 600px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        canvas { border: 6px solid #222; cursor: crosshair; background: linear-gradient(to bottom, #0f0c29 0%, #302b63 50%, #24243e 100%); display: block; }
        #uiLayer { position: absolute; top: 10px; left: 20px; width: 860px; pointer-events: none; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; color: white; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        #timer { font-size: 50px; color: #ffeb3b; }
        #weaponUI { font-size: 22px; color: #00e676; margin-top: 5px; }
        #powerBox { width: 100%; height: 20px; background: rgba(0,0,0,0.8); border: 2px solid #fff; margin-top: 15px; }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffeb3b, #f44336); }
        .water { position: absolute; bottom: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, rgba(50, 100, 200, 0.7), rgba(20, 50, 150, 1)); pointer-events: none; border-top: 2px solid rgba(255,255,255,0.6); }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="900" height="600"></canvas>
        <div class="water"></div>
        <div id="uiLayer">
            <div class="flex">
                <div id="p1" style="color: #ff7675; font-size: 24px;">RED TEAM (3/3)</div>
                <div id="timer">30</div>
                <div id="p2" style="color: #74b9ff; font-size: 24px;">BLUE TEAM (3/3)</div>
            </div>
            <div class="flex" style="font-size: 16px; margin-top: 5px; color: #ccc;">
                <div>[1:바주카] [2:수류탄] [3:공중폭격] | 방향키 이동/점프</div>
                <div id="windUI">바람: 0.00</div>
            </div>
            <div id="weaponUI">▶ 바주카</div>
            <div id="powerBox"><div id="powerBar"></div></div>
        </div>
        <div id="startScreen">
            <h1 style="font-size: 60px; color: #f1c40f; margin: 0;">ULTIMATE DETAIL</h1>
            <p style="font-size: 20px; color: #ccc; margin-top: 20px;">화면을 클릭하여 시작하세요!</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const WORLD_W = 2000; const WORLD_H = 1200;
    const WATER_LEVEL = WORLD_H - 60;
    
    const tCanvas = document.createElement('canvas');
    tCanvas.width = WORLD_W; tCanvas.height = WORLD_H;
    const tCtx = tCanvas.getContext('2d');

    let camera = { x: 0, y: 0 }; let targetCam = { x: 0, y: 0 };

    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type) {
        if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
        if (type === 'jump') { osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
        else if (type === 'shoot') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); }
        else if (type === 'explode') { osc.type = 'square'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.4); gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
        else if (type === 'splash') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.3); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); }
    }

    let worms = [
        { team: 0, x: 250, y: 100, r: 9, vx: 0, vy: 0, color: '#ff7675', hp: 100, name: 'Worm 1', isDead: false },
        { team: 0, x: 450, y: 100, r: 9, vx: 0, vy: 0, color: '#ff7675', hp: 100, name: 'Worm 2', isDead: false },
        { team: 0, x: 650, y: 100, r: 9, vx: 0, vy: 0, color: '#ff7675', hp: 100, name: 'Worm 3', isDead: false },
        { team: 1, x: 1350, y: 100, r: 9, vx: 0, vy: 0, color: '#74b9ff', hp: 100, name: 'Zepli', isDead: false },
        { team: 1, x: 1550, y: 100, r: 9, vx: 0, vy: 0, color: '#74b9ff', hp: 100, name: 'Boggy', isDead: false },
        { team: 1, x: 1750, y: 100, r: 9, vx: 0, vy: 0, color: '#74b9ff', hp: 100, name: 'Spud', isDead: false }
    ];
    let graves = []; // 비석 배열
    let crates = []; 
    let clouds = Array.from({length: 15}, () => ({ x: Math.random() * WORLD_W, y: Math.random() * 300, size: 20 + Math.random()*30, speed: 0.5 + Math.random() }));
    
    let currentTeam = 0, activeWormIndex = 0, turnTime = 30, frameCount = 0, wind = 0;
    let state = 'START'; let mouse = { x: 0, y: 0, worldX: 0, worldY: 0 };
    let isCharging = false, chargePower = 0;

    const WEAPONS = [
        { id: 1, name: '바주카', type: 'impact', color: '#fff' },
        { id: 2, name: '수류탄', type: 'bounce', color: '#55efc4' },
        { id: 3, name: '공중 폭격', type: 'airstrike', color: '#fdcb6e' }
    ];
    let currentWeapon = 0; let projectiles = [], particles = [], floatingTexts = [];
    const GRAVITY = 0.2;
    const ui = { timer: document.getElementById('timer'), wind: document.getElementById('windUI'), power: document.getElementById('powerBar'), weapon: document.getElementById('weaponUI'), p1: document.getElementById('p1'), p2: document.getElementById('p2') };

    function initTerrain() {
        tCtx.clearRect(0, 0, WORLD_W, WORLD_H);
        tCtx.fillStyle = '#f1c40f'; // 웜즈 특유의 노란 치즈색
        tCtx.beginPath(); tCtx.moveTo(0, WORLD_H);
        for (let x = 0; x <= WORLD_W; x += 15) {
            let baseHeight = 450 + Math.sin(x * 0.005) * 120 + Math.cos(x * 0.01) * 80;
            if (x > 750 && x < 1250) baseHeight += Math.sin((x - 750) / 500 * Math.PI) * 700; // 가운데 거대 바다웅덩이
            tCtx.lineTo(x, baseHeight);
        }
        tCtx.lineTo(WORLD_W, WORLD_H); tCtx.fill();

        tCtx.globalCompositeOperation = 'destination-out';
        for (let i = 0; i < 300; i++) {
            tCtx.beginPath();
            tCtx.arc(Math.random() * WORLD_W, 250 + Math.random() * (WORLD_H - 100), 10 + Math.random() * 40, 0, Math.PI * 2);
            tCtx.fill();
        }
        tCtx.globalCompositeOperation = 'source-over';
    }

    function isStatic(x, y) { if (x < 0 || x >= WORLD_W || y >= WORLD_H) return false; if (y < 0) return false; return tCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data[3] > 0; }
    function addFloatText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 60, vy: -1.5 }); }
    function createSplash(x) {
        playSound('splash');
        for(let i=0; i<15; i++) {
            particles.push({ x: x, y: WATER_LEVEL, vx: (Math.random()-0.5)*10, vy: -Math.random()*8 - 2, life: 30, color: '#74b9ff', size: Math.random()*3+2, type: 'water' });
        }
    }

    function dieWorm(w) {
        if(w.isDead) return;
        w.isDead = true; w.hp = 0;
        graves.push({ x: w.x, y: w.y, vy: 0, w: 16, h: 22, color: w.color });
        explode(w.x, w.y, 30); // 죽을 때 자폭 폭발
    }

    function switchTurn() {
        if (state === 'GAMEOVER') return;
        let redAlive = worms.filter(w => w.team === 0 && !w.isDead).length; let blueAlive = worms.filter(w => w.team === 1 && !w.isDead).length;
        ui.p1.innerText = `RED TEAM (${redAlive}/3)`; ui.p2.innerText = `BLUE TEAM (${blueAlive}/3)`;
        if (redAlive === 0 || blueAlive === 0) { state = 'GAMEOVER'; ui.timer.innerText = redAlive > 0 ? "RED WIN!" : (blueAlive > 0 ? "BLUE WIN!" : "DRAW!"); ui.timer.style.color = '#fff'; return; }
        
        currentTeam = (currentTeam + 1) % 2; let found = false;
        while (!found) { activeWormIndex = (activeWormIndex + 1) % worms.length; if (worms[activeWormIndex].team === currentTeam && !worms[activeWormIndex].isDead) found = true; }
        
        turnTime = 30; state = 'PLAY'; currentWeapon = 0; updateWeaponUI();
        wind = (Math.random() - 0.5) * 0.35; // 바람 세기 증가
        ui.wind.innerText = `바람: ${wind > 0 ? "▶▶" : "◀◀"} ${Math.abs(wind).toFixed(2)}`;
        ui.timer.style.color = currentTeam === 0 ? '#ff7675' : '#74b9ff';
    }

    function explode(ex, ey, radius) {
        playSound('explode');
        tCtx.globalCompositeOperation = 'destination-out'; tCtx.beginPath(); tCtx.arc(ex, ey, radius, 0, Math.PI * 2); tCtx.fill(); tCtx.globalCompositeOperation = 'source-over';

        for(let i=0; i<40; i++) particles.push({ x: ex, y: ey, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 30 + Math.random() * 20, color: Math.random() > 0.5 ? '#ffffff' : '#f1c40f', size: Math.random() * 5 + 3 });

        worms.forEach(w => { if (w.isDead) return; let dist = Math.hypot(w.x - ex, w.y - ey); if (dist < radius + 45) { let dmg = Math.floor((1 - dist / (radius + 45)) * 60); if (dmg > 0) { w.hp -= dmg; w.vy -= 8; w.vx += (w.x > ex ? 6 : -6); addFloatText(w.x, w.y - 25, `-${dmg}`, '#fff'); if(w.hp <= 0) dieWorm(w); } } });
        crates.forEach((c, i) => { if (Math.hypot(c.x + c.w/2 - ex, c.y + c.h/2 - ey) < radius + 25) crates.splice(i, 1); });
        
        // 비석도 날아감
        graves.forEach(g => { let dist = Math.hypot(g.x - ex, g.y - ey); if(dist < radius + 30) { g.vy -= 8; g.x += (g.x > ex ? 4 : -4); } });

        setTimeout(() => { if (projectiles.length === 0 && state === 'FIRING') switchTurn(); }, 1600);
    }

    function updateCamera() {
        let targetX, targetY;
        if (projectiles.length > 0) { targetX = projectiles[0].x; targetY = projectiles[0].y; } 
        else if (state === 'FIRING' && WEAPONS[currentWeapon].type === 'airstrike') { targetX = mouse.worldX; targetY = mouse.worldY; } 
        else { let activeWorm = worms[activeWormIndex]; targetX = activeWorm.x; targetY = activeWorm.y; }
        targetCam.x = targetX - canvas.width / 2; targetCam.y = targetY - canvas.height / 2;
        targetCam.x = Math.max(0, Math.min(targetCam.x, WORLD_W - canvas.width)); targetCam.y = Math.max(0, Math.min(targetCam.y, WORLD_H - canvas.height));
        camera.x += (targetCam.x - camera.x) * 0.12; camera.y += (targetCam.y - camera.y) * 0.12;
        mouse.worldX = mouse.x + camera.x; mouse.worldY = mouse.y + camera.y;
    }

    function drawClassicWorm(w, active) {
        if (w.isDead) return;
        ctx.save();
        ctx.translate(w.x, w.y);
        
        // 이동 시 꿈틀거림 (Squish Animation)
        let squishX = 1, squishY = 1;
        if (Math.abs(w.vx) > 0.1) {
            squishY = 1 + Math.sin(frameCount * 0.5) * 0.15;
            squishX = 1 - Math.sin(frameCount * 0.5) * 0.1;
        }
        
        if (w.vx < 0 || (active && mouse.worldX < w.x && !isCharging)) ctx.scale(-1 * squishX, 1 * squishY); 
        else ctx.scale(1 * squishX, 1 * squishY);

        ctx.fillStyle = '#ffb8b8'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(0, 0, w.r * 1.1, w.r * 1.4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(w.r * 0.3, -w.r * 0.5, w.r * 0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(w.r * 0.5, -w.r * 0.5, w.r * 0.2, 0, Math.PI*2); ctx.fill(); 
        ctx.restore();

        // UI 렌더링
        ctx.save();
        ctx.translate(w.x, w.y - 30); 
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.beginPath(); ctx.rect(-28, -20, 56, 16); ctx.fill(); ctx.stroke();
        ctx.font = 'bold 12px Arial'; ctx.fillStyle = w.team === 0 ? '#ff7675' : '#74b9ff'; ctx.fillText(w.name, 0, -11);
        ctx.beginPath(); ctx.rect(-16, -2, 32, 16); ctx.fill(); ctx.stroke();
        ctx.font = 'bold 13px Arial'; ctx.fillText(Math.floor(w.hp), 0, 7);
        ctx.restore();

        if (active) {
            // 부드러운 화살표 애니메이션
            ctx.fillStyle = 'white'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; 
            ctx.fillText("▼", w.x, w.y - 55 + Math.sin(frameCount * 0.1)*5);
            
            // 세밀한 십자선 조준선
            if (WEAPONS[currentWeapon].type !== 'airstrike' && !isCharging) {
                let angle = Math.atan2(mouse.worldY - w.y, mouse.worldX - w.x);
                let cx = w.x + Math.cos(angle) * 40, cy = w.y + Math.sin(angle) * 40;
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(cx - 6, cy); ctx.lineTo(cx + 6, cy); ctx.moveTo(cx, cy - 6); ctx.lineTo(cx, cy + 6); ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); // 이중 테두리로 가시성 확보
            }
        }
    }

    function drawGrave(g) {
        ctx.fillStyle = '#95a5a6'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.rect(g.x - g.w/2, g.y - g.h, g.w, g.h); ctx.fill(); ctx.stroke(); // 비석 기둥
        ctx.beginPath(); ctx.rect(g.x - g.w, g.y - g.h + 5, g.w * 2, g.w * 0.4); ctx.fill(); ctx.stroke(); // 비석 가로선 (십자가)
        ctx.fillStyle = g.color; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillText("R.I.P", g.x, g.y - g.h - 5);
    }

    function drawBackground() {
        // 별 (고정)
        for(let i=0; i<50; i++) {
            ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.5})`;
            ctx.fillRect((i*123)%WORLD_W, (i*321)%WORLD_H/2, 2, 2);
        }
        // 구름 (바람에 따라 이동)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        clouds.forEach(c => {
            c.x += c.speed * wind * 2;
            if(c.x > WORLD_W + c.size) c.x = -c.size;
            if(c.x < -c.size) c.x = WORLD_W + c.size;
            ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.arc(c.x+c.size*0.8, c.y-c.size*0.3, c.size*0.8, 0, Math.PI*2); ctx.arc(c.x-c.size*0.8, c.y-c.size*0.3, c.size*0.8, 0, Math.PI*2); ctx.fill();
        });
    }

    function update() {
        if(state === 'START' || state === 'GAMEOVER') return;
        frameCount++;
        if (state === 'PLAY' && frameCount % 60 === 0) { turnTime--; ui.timer.innerText = turnTime; if (turnTime <= 0) { state = 'FIRING'; switchTurn(); } }
        updateCamera();

        worms.forEach(w => {
            if (w.isDead) return;
            let prevVy = w.vy; w.vy += GRAVITY; let nx = w.x + w.vx, ny = w.y + w.vy;
            if (isStatic(nx, ny + w.r)) { if (prevVy > 9) { let fallDmg = Math.floor((prevVy - 9) * 6); w.hp -= fallDmg; addFloatText(w.x, w.y - 25, `낙하! -${fallDmg}`, '#ff9800'); playSound('explode'); if(w.hp<=0) dieWorm(w); } if (!isStatic(nx, ny + w.r - 4)) { w.x = nx; w.y = ny - 2; } else { w.vy = 0; w.vx *= 0.5; } } 
            else { w.x = nx; w.y = ny; }
            
            if (w.y > WATER_LEVEL && !w.isDead) { createSplash(w.x); dieWorm(w); addFloatText(w.x, w.y, "수장됨!", '#00bcd4'); }
        });

        // 비석 물리 엔진 적용
        for(let i = graves.length - 1; i >= 0; i--) {
            let g = graves[i];
            g.vy += GRAVITY;
            if (isStatic(g.x, g.y)) { g.vy = 0; } else { g.y += g.vy; }
            if (g.y > WATER_LEVEL + 20) { createSplash(g.x); graves.splice(i, 1); } // 비석도 물에 빠짐
        }

        projectiles.forEach((p, i) => {
            if (p.weapon.type === 'impact') p.vx += wind; p.vy += GRAVITY; p.x += p.vx; p.y += p.vy;
            if (p.y > WATER_LEVEL) { createSplash(p.x); explode(p.x, p.y, 45); projectiles.splice(i, 1); return; } // 포탄 물에 빠질 때
            if (p.weapon.type === 'impact' || p.weapon.type === 'airstrike') { if (isStatic(p.x, p.y) || p.x < 0 || p.x > WORLD_W) { explode(p.x, p.y, p.weapon.type === 'airstrike' ? 45 : 55); projectiles.splice(i, 1); } } 
            else if (p.weapon.type === 'bounce') { p.fuse--; if (isStatic(p.x, p.y + 3)) { p.vy *= -0.65; p.vx *= 0.75; p.y -= 2; } if (isStatic(p.x + (p.vx>0?3:-3), p.y)) { p.vx *= -0.65; } if (p.fuse <= 0) { explode(p.x, p.y, 60); projectiles.splice(i, 1); } }
        });

        particles.forEach((p, i) => { p.vy += (p.type === 'water' ? GRAVITY : 0); p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1); });
        floatingTexts.forEach((ft, i) => { ft.y += ft.vy; ft.life--; if (ft.life <= 0) floatingTexts.splice(i, 1); });

        if (isCharging && state === 'PLAY') { chargePower = Math.min(chargePower + 0.6, 28); ui.power.style.width = (chargePower / 28 * 100) + '%'; }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save(); ctx.translate(-camera.x, -camera.y);
        
        drawBackground(); // 구름과 별 렌더링
        ctx.drawImage(tCanvas, 0, 0);

        graves.forEach(g => drawGrave(g)); // 비석 렌더링
        worms.forEach((w, i) => { drawClassicWorm(w, i === activeWormIndex && state === 'PLAY'); });

        if (state === 'PLAY' && WEAPONS[currentWeapon].type === 'airstrike') { ctx.strokeStyle = 'red'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(mouse.worldX, mouse.worldY, 20, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mouse.worldX - 25, mouse.worldY); ctx.lineTo(mouse.worldX + 25, mouse.worldY); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mouse.worldX, mouse.worldY - 25); ctx.lineTo(mouse.worldX, mouse.worldY + 25); ctx.stroke(); }

        projectiles.forEach(p => { ctx.fillStyle = p.weapon.color; ctx.beginPath(); if(p.weapon.type === 'airstrike') ctx.ellipse(p.x, p.y, 5, 12, 0, 0, Math.PI*2); else ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill(); if(p.weapon.type === 'bounce') { ctx.fillStyle = (Math.floor(p.fuse / 10) % 2 === 0) ? 'red' : 'white'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); } });

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1.0; });
        floatingTexts.forEach(ft => { ctx.fillStyle = ft.color; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y); });

        ctx.restore();
        update(); requestAnimationFrame(draw);
    }

    document.getElementById('startScreen').addEventListener('click', function() { initAudio(); this.style.display = 'none'; state = 'PLAY'; });
    canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });
    window.addEventListener('keydown', (e) => { if (state !== 'PLAY') return; let w = worms[activeWormIndex]; if (e.key === 'ArrowLeft') w.vx = -2.5; if (e.key === 'ArrowRight') w.vx = 2.5; if (e.key === 'ArrowUp' && isStatic(w.x, w.y + w.r + 2)) { w.vy = -6.5; w.vx *= 2.8; playSound('jump'); } if (e.key === '1') { currentWeapon = 0; updateWeaponUI(); } if (e.key === '2') { currentWeapon = 1; updateWeaponUI(); } if (e.key === '3') { currentWeapon = 2; updateWeaponUI(); } });
    window.addEventListener('keyup', (e) => { let w = worms[activeWormIndex]; if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') w.vx = 0; });
    canvas.addEventListener('mousedown', () => { if (state !== 'PLAY') return; if (WEAPONS[currentWeapon].type === 'airstrike') { state = 'FIRING'; for(let i=0; i<6; i++) { setTimeout(() => { projectiles.push({ x: mouse.worldX + (Math.random() - 0.5)*120, y: camera.y - 60, vx: 0, vy: 3.5, weapon: WEAPONS[2] }); }, i * 280); } ui.timer.innerText = "폭격!"; playSound('shoot'); } else { isCharging = true; chargePower = 0; } });
    canvas.addEventListener('mouseup', () => { if (!isCharging || state !== 'PLAY') return; isCharging = false; state = 'FIRING'; playSound('shoot'); let w = worms[activeWormIndex]; let angle = Math.atan2(mouse.worldY - w.y, mouse.worldX - w.x); let wp = WEAPONS[currentWeapon]; projectiles.push({ x: w.x, y: w.y - 5, vx: Math.cos(angle) * chargePower, vy: Math.sin(angle) * chargePower, weapon: wp, fuse: wp.type === 'bounce' ? 150 : 0 }); ui.power.style.width = '0%'; ui.timer.innerText = "발사!"; });
    function updateWeaponUI() { let w = WEAPONS[currentWeapon]; ui.weapon.innerText = `▶ ${w.name}`; ui.weapon.style.color = w.color; }

    initTerrain(); draw();
</script>
</body>
</html>
