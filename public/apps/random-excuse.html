<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤조퇴사유뽑기 모음</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 기본(초기) 테마 */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: white;
            --text-color: #212529;
            --sub-text: #6c757d;
            --box-bg: #e9ecef;
            --box-text: #495057;
            --box-border: #ced4da;
            --highlight-bg: #fff3cd;
            --highlight-text: #d32f2f;
            --highlight-border: #ffc107;
            --btn-bg: #0d6efd;
            --btn-hover: #0b5ed7;
            --shadow-color: rgba(0,0,0,0.08);
        }

        /* 1. 보편적 조퇴 테마 (블루) */
        body.blue-theme {
            --bg-color: #e0f7fa;
            --highlight-bg: #e1f5fe;
            --highlight-text: #0288d1;
            --highlight-border: #4fc3f7;
            --btn-bg: #0288d1;
            --btn-hover: #0277bd;
        }

        /* 2. MZ 트렌디 테마 (퍼플) */
        body.purple-theme {
            --bg-color: #f3e5f5;
            --highlight-bg: #f3e5f5;
            --highlight-text: #8e24aa;
            --highlight-border: #ba68c8;
            --btn-bg: #8e24aa;
            --btn-hover: #7b1fa2;
        }

        /* 3. 병조퇴 힐링 테마 (민트) */
        body.mint-theme {
            --bg-color: #e8f5e9;
            --highlight-bg: #e8f5e9;
            --highlight-text: #2e7d32;
            --highlight-border: #81c784;
            --btn-bg: #2e7d32;
            --btn-hover: #1b5e20;
        }

        /* 4. 선배/원로교사 고상한 테마 (브라운) */
        body.brown-theme {
            --bg-color: #efebe9;
            --highlight-bg: #d7ccc8;
            --highlight-text: #5d4037;
            --highlight-border: #a1887f;
            --btn-bg: #6d4c41;
            --btn-hover: #5d4037;
        }

        /* 5. 41조 연수 학구적 테마 (그린/올리브) */
        body.green-theme {
            --bg-color: #f1f8e9;
            --highlight-bg: #f1f8e9;
            --highlight-text: #558b2f;
            --highlight-border: #aed581;
            --btn-bg: #689f38;
            --btn-hover: #558b2f;
        }

        /* 6. 파워 MZ 예능용 극대노 테마 (다크/레드) */
        body.dark-theme {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #ff4757;
            --sub-text: #a4b0be;
            --box-bg: #3d3d3d;
            --box-text: #f1f2f6;
            --box-border: #747d8c;
            --highlight-bg: #ffeaa7;
            --highlight-text: #d63031;
            --highlight-border: #fdcb6e;
            --btn-bg: #ff4757;
            --btn-hover: #ff6b81;
            --shadow-color: rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            transition: background-color 0.5s ease; /* 부드러운 배경색 전환 */
        }
        .container {
            text-align: center;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            max-width: 450px;
            width: 90%;
            transition: all 0.3s ease;
            position: relative;
        }
        body.dark-theme .container {
            border: 2px solid #ff4757;
        }
        h1 {
            color: var(--text-color);
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .cheer-message {
            color: var(--sub-text);
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: var(--box-bg);
            color: var(--text-color);
            border: 2px solid var(--box-border);
            padding: 16px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background-color: #e2e6ea;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }
        .menu-btn.special {
            background-color: #ff4757;
            color: white;
            border: none;
        }
        .menu-btn.special:hover {
            background-color: #ff6b81;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--sub-text);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
        }
        .back-btn:hover {
            background-color: var(--box-bg);
        }
        .result-wrapper {
            position: relative;
        }
        .result-box {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--box-bg);
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 20px;
            font-weight: 700;
            color: var(--box-text);
            padding: 20px;
            line-height: 1.4;
            word-break: keep-all;
            transition: all 0.2s ease;
            border: 2px dashed var(--box-border);
            user-select: none;
        }
        .result-box.highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
            border-color: var(--highlight-border);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        body.dark-theme .result-box.highlight {
            box-shadow: 0 5px 20px rgba(253, 203, 110, 0.4);
        }
        .copy-hint {
            display: none;
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--sub-text);
            font-weight: bold;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .action-btn {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 18px 32px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .action-btn:hover {
            background-color: var(--btn-hover);
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        .action-btn:disabled {
            background-color: #adb5bd;
            color: #e9ecef;
            cursor: not-allowed;
            transform: none;
        }
        body.dark-theme .action-btn:disabled {
            background-color: #57606f;
            color: #a4b0be;
        }
        
        .disclaimer {
            margin-top: 25px;
            font-size: 13px;
            color: var(--sub-text);
            opacity: 0.8;
            font-weight: 500;
        }
        .credit {
            margin-top: 5px;
            font-size: 14px;
            color: var(--sub-text);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>

        <div class="credit">Made by. 엽쌤</div>
    </div>

        let currentCategory = '';
        let currentReasons = [];
        let isSpinning = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            const config = data[categoryKey];
            currentReasons = config.reasons;

            document.body.className = config.theme;
            
            document.getElementById('picker-title').textContent = config.title;
            document.getElementById('picker-cheer').textContent = config.cheer;
            
            const resultBox = document.getElementById('result');
            resultBox.textContent = "버튼을 눌러 뽑아보세요!";
            resultBox.classList.remove('highlight');
            document.getElementById('copyHint').style.display = 'none';
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').textContent = "사유 뽑기";

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('picker-screen').style.display = 'block';
        }

        function showMenu() {
            document.body.className = ''; 
            document.getElementById('picker-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        // 룰렛 돌아가는 틱 소리
        function playTick() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // 테마별 개별 당첨 효과음 플레이어
        function playSequence(freqs, type, interval, decay, vol = 0.1) {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            freqs.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = type;
                
                const start = now + index * interval;
                osc.frequency.setValueAtTime(freq, start);
                
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(vol, start + 0.02);
                const currentDecay = index === freqs.length - 1 ? decay : interval;
                gain.gain.exponentialRampToValueAtTime(0.001, start + currentDecay);
                
                osc.start(start);
                osc.stop(start + currentDecay);
            });
        }

        // 고상하고 차분한 테마용 부드러운 화음 플레이어
        function playChord(freqs, type, decay, lowPass = false) {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            freqs.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                if (lowPass) {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 600;
                    gain.connect(filter);
                    filter.connect(audioCtx.destination);
                } else {
                    gain.connect(audioCtx.destination);
                }

                osc.connect(gain);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + decay);

                osc.start(now);
                osc.stop(now + decay);
            });
        }

        // 당첨음 분기 처리
        function playTada() {
            if(!audioCtx) return;
            
            if (currentCategory === 'general') {
                // 1. 보편적: 깔끔하고 산뜻한 정석 띠링~ (C Major)
                playSequence([523.25, 659.25, 783.99, 1046.50], 'sine', 0.1, 0.4);
            } 
            else if (currentCategory === 'mz') {
                // 2. MZ: 트렌디하고 통통 튀는 뾰로롱~! (빠른 아르페지오)
                playSequence([880, 1108.73, 1318.51, 1760], 'triangle', 0.06, 0.5);
            } 
            else if (currentCategory === 'sick') {
                // 3. 병조퇴: 부드럽고 차분한 힐링 사운드
                playChord([392.00, 493.88], 'sine', 2.0); // G4, B4 여운 길게
            } 
            else if (currentCategory === 'senior') {
                // 4. 선배교사: 묵직하고 품격있는 징/종소리
                playChord([220.00, 329.63], 'sine', 2.5, true); // A3, E4 (로우패스 필터)
            } 
            else if (currentCategory === 'training') {
                // 5. 41조 연수: 아이디어가 떠오르는 맑고 경쾌한 띵동!
                playSequence([1046.50, 1567.98], 'square', 0.1, 0.3, 0.05); // C6, G6
            } 
            else if (currentCategory === 'power') {
                // 6. 파워 MZ 예능용: 킹받는 레트로 오락실 에러음 (하행음)
                playSequence([600, 500, 400, 300], 'square', 0.15, 0.3, 0.15);
            }
        }

        function startDraw() {
            initAudio(); 
            
            const resultBox = document.getElementById('result');
            const btn = document.getElementById('drawBtn');
            const hint = document.getElementById('copyHint');
            
            isSpinning = true;
            btn.disabled = true;
            resultBox.classList.remove('highlight');
            hint.style.display = 'none'; 
            
            let shuffleCount = 0;
            const maxShuffles = 40; 
            const intervalTime = 25; 

            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * currentReasons.length);
                resultBox.textContent = currentReasons[randomIndex];
                playTick(); 
                shuffleCount++;

                if (shuffleCount >= maxShuffles) {
                    clearInterval(interval);
                    const finalIndex = Math.floor(Math.random() * currentReasons.length);
                    resultBox.textContent = currentReasons[finalIndex]; 
                    resultBox.classList.add('highlight');
                    
                    playTada(); 
                    
                    isSpinning = false;
                    btn.disabled = false;
                    btn.textContent = "다시 뽑기";
                    hint.style.display = 'block'; 
                }
            }, intervalTime);
        }

        function copyToClipboard() {
            const resultBox = document.getElementById('result');
            const hint = document.getElementById('copyHint');
            
            if (isSpinning || resultBox.textContent === "버튼을 눌러 뽑아보세요!") return;

            const textToCopy = resultBox.textContent;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = resultBox.textContent;
                const copyMsg = data[currentCategory].copyMsg;
                
                resultBox.textContent = copyMsg;
                hint.style.display = 'none';
                
                setTimeout(() => {
                    resultBox.textContent = originalText;
                    hint.style.display = 'block';
                }, 1200);
            }).catch(err => {
                alert("복사에 실패했습니다. 직접 드래그하여 복사해주세요.");
            });
        }
