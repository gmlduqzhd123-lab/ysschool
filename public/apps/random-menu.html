<head>

        /* 기본 및 테마별 색상 설정 */
        :root {
            --bg-color: #fffaf0;
            --container-bg: #ffffff;
            --text-color: #212529;
            --sub-text: #6c757d;
            --box-bg: #f8f9fa;
            --box-text: #495057;
            --box-border: #dee2e6;
            --highlight-bg: #fff3cd;
            --highlight-text: #d32f2f;
            --highlight-border: #ffc107;
            --btn-bg: #ff9800;
            --btn-hover: #f57c00;
            --shadow-color: rgba(0,0,0,0.08);
        }

        body.morning-theme {
            --bg-color: #fffde7;
            --highlight-bg: #fff9c4;
            --highlight-text: #f57f17;
            --highlight-border: #fbc02d;
            --btn-bg: #fbc02d;
            --btn-hover: #f9a825;
        }

        body.lunch-theme {
            --bg-color: #e0f2f1;
            --highlight-bg: #e0f7fa;
            --highlight-text: #00695c;
            --highlight-border: #4dd0e1;
            --btn-bg: #26a69a;
            --btn-hover: #00897b;
        }

        body.dinner-theme {
            --bg-color: #fbe9e7;
            --highlight-bg: #ffccbc;
            --highlight-text: #bf360c;
            --highlight-border: #ff8a65;
            --btn-bg: #d84315;
            --btn-hover: #bf360c;
        }

        body.night-theme {
            --bg-color: #121212;
            --container-bg: #212121;
            --text-color: #e0e0e0;
            --sub-text: #9e9e9e;
            --box-bg: #303030;
            --box-text: #ffffff;
            --box-border: #616161;
            --highlight-bg: #311b92;
            --highlight-text: #b388ff;
            --highlight-border: #651fff;
            --btn-bg: #651fff;
            --btn-hover: #6200ea;
            --shadow-color: rgba(0,0,0,0.5);
        }

        body.snack-theme {
            --bg-color: #fce4ec;
            --highlight-bg: #f8bbd0;
            --highlight-text: #c2185b;
            --highlight-border: #f06292;
            --btn-bg: #ec407a;
            --btn-hover: #d81b60;
        }

        body.delivery-theme {
            --bg-color: #fff3e0;
            --highlight-bg: #ffecb3;
            --highlight-text: #d50000;
            --highlight-border: #ff1744;
            --btn-bg: #d50000;
            --btn-hover: #b71c1c;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            transition: background-color 0.4s ease;
        }
        .container {
            text-align: center;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 40px var(--shadow-color);
            max-width: 480px;
            width: 90%;
            transition: all 0.3s ease;
            position: relative;
        }
        body.night-theme .container { border: 2px solid #651fff; }
        
        h1 {
            color: var(--text-color);
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .cheer-message {
            color: var(--sub-text);
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: var(--box-bg);
            color: var(--text-color);
            border: 2px solid var(--box-border);
            padding: 20px 10px;
            font-size: 18px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .menu-btn span { font-size: 28px; }
        .menu-btn:hover {
            background-color: var(--highlight-bg);
            border-color: var(--highlight-border);
            transform: translateY(-3px);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--sub-text);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .back-btn:hover { background-color: var(--box-bg); color: var(--text-color); }
        
        .result-wrapper { position: relative; }
        .result-box {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--box-bg);
            border-radius: 20px;
            margin-bottom: 30px;
            padding: 30px 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px dashed var(--box-border);
            user-select: none;
            gap: 15px;
        }
        
        .emoji-display {
            font-size: 70px;
            line-height: 1;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.2s;
        }
        .text-display {
            font-size: 24px;
            font-weight: 800;
            color: var(--box-text);
            word-break: keep-all;
        }

        .result-box.highlight {
            background: var(--highlight-bg);
            border-color: var(--highlight-border);
            border-style: solid;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .result-box.highlight .text-display { color: var(--highlight-text); text-decoration: underline; text-underline-offset: 6px; }
        .result-box.highlight .emoji-display {
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .link-hint {
            display: none;
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--sub-text);
            font-weight: bold;
            animation: fadeIn 0.5s;
            white-space: nowrap;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .action-btn {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 20px;
            font-size: 22px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 800;
            width: 100%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .action-btn:hover { background-color: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .action-btn:disabled {
            background-color: #ced4da;
            color: #f8f9fa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .credit { margin-top: 20px; font-size: 14px; color: var(--sub-text); font-weight: 600; }

</head>

        <h1>🤤 오늘 뭐 먹지??</h1>
        <div class="cheer-message">메뉴 결정 장애, 이제 안녕! 상황을 선택하세요.</div>
        
        <div class="menu-grid">

            <button class="menu-btn" onclick="selectCategory('delivery')"><span>🛵</span> 배달 음식</button>
        </div>
        <div class="credit">Made by. 엽쌤</div>
    </div>

        <button class="action-btn" onclick="startDraw()" id="drawBtn">메뉴 뽑기</button>
        <div class="credit">Made by. 엽쌤</div>

        let currentCategory = '';
        let currentReasons = [];
        let isSpinning = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            const config = data[categoryKey];
            currentReasons = config.items;

            document.body.className = config.theme;
            
            document.getElementById('picker-title').textContent = config.title;
            document.getElementById('picker-cheer').textContent = config.cheer;
            
            const resultBox = document.getElementById('result');
            document.getElementById('emoji-display').textContent = "🍽️";
            document.getElementById('text-display').textContent = "버튼을 눌러 메뉴를 뽑으세요!";
            resultBox.classList.remove('highlight');
            
            document.getElementById('linkHint').style.display = 'none';
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').textContent = "메뉴 뽑기";

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('picker-screen').style.display = 'block';
        }

        function showMenu() {
            document.body.className = ''; 
            document.getElementById('picker-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }

        // 룰렛 돌아가는 소리
        function playTick() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // 당첨 소리
        function playTada() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const freqs = [523.25, 659.25, 783.99, 1046.50]; 
            
            freqs.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.type = 'triangle';
                
                const startTime = now + index * 0.08; 
                osc.frequency.setValueAtTime(freq, startTime);
                
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
                
                const decay = index === freqs.length - 1 ? 0.5 : 0.2;
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + decay);
                
                osc.start(startTime);
                osc.stop(startTime + decay);
            });
        }

        function startDraw() {
            initAudio(); 
            
            const resultBox = document.getElementById('result');
            const emojiDisplay = document.getElementById('emoji-display');
            const textDisplay = document.getElementById('text-display');
            const btn = document.getElementById('drawBtn');
            const hint = document.getElementById('linkHint');
            
            isSpinning = true;
            btn.disabled = true;
            resultBox.classList.remove('highlight');
            hint.style.display = 'none'; 
            
            let shuffleCount = 0;
            const maxShuffles = 40; 
            const intervalTime = 25; 

            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * currentReasons.length);
                const rawText = currentReasons[randomIndex];
                
                const spaceIndex = rawText.indexOf(' ');
                emojiDisplay.textContent = rawText.substring(0, spaceIndex);
                textDisplay.textContent = rawText.substring(spaceIndex + 1);
                
                playTick(); 
                shuffleCount++;

                if (shuffleCount >= maxShuffles) {
                    clearInterval(interval);
                    
                    const finalIndex = Math.floor(Math.random() * currentReasons.length);
                    const finalRawText = currentReasons[finalIndex];
                    const finalSpaceIndex = finalRawText.indexOf(' ');
                    
                    emojiDisplay.textContent = finalRawText.substring(0, finalSpaceIndex);
                    textDisplay.textContent = finalRawText.substring(finalSpaceIndex + 1);
                    
                    resultBox.classList.add('highlight');
                    playTada(); 
                    
                    isSpinning = false;
                    btn.disabled = false;
                    btn.textContent = "다시 뽑기";
                    hint.style.display = 'block'; 
                }
            }, intervalTime);
        }

        // 새 탭으로 검색 결과 이동 (복사 기능 대체)
        function openLink() {
            const textDisplay = document.getElementById('text-display');
            
            // 뽑기 진행 중이거나 초기 상태일 때는 링크 이동 방지
            if (isSpinning || textDisplay.textContent === "버튼을 눌러 메뉴를 뽑으세요!") return;

            const menuName = textDisplay.textContent;
            let url = "";

            // 배달, 야식은 네이버 맛집 검색 / 그 외(아침, 점심, 저녁, 간식)는 유튜브 레시피 검색
            if (currentCategory === 'delivery' || currentCategory === 'night') {
                url = `https://search.naver.com/search.naver?query=${encodeURIComponent(menuName + ' 맛집')}`;
            } else {
                url = `https://www.youtube.com/results?search_query=${encodeURIComponent(menuName + ' 레시피')}`;
            }
            
            window.open(url, '_blank');
        }
