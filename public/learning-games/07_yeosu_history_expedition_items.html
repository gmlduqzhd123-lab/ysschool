<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>여수 역사 탐험대</title><style>
:root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--text:#f8fafc;--muted:#cbd5e1;--accent:#38bdf8;--good:#22c55e;--bad:#ef4444;--warn:#f59e0b;--pink:#ec4899}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;min-height:100dvh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#08111f,#111827 58%,#172554);color:var(--text);touch-action:manipulation;user-select:none}body{display:flex;align-items:center;justify-content:center;padding:10px;overflow-x:hidden}.wrap{width:min(100%,1040px);margin:auto}.panel{background:rgba(15,23,42,.90);border:1px solid rgba(255,255,255,.12);border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.42);overflow:hidden}.top{display:flex;gap:10px;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(255,255,255,.07);flex-wrap:wrap}.title{font-weight:1000;font-size:clamp(19px,4vw,31px);letter-spacing:-.04em}.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.105);font-weight:900;white-space:nowrap}.game{position:relative;min-height:560px;padding:12px}.hud{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}.btn{border:0;border-radius:14px;padding:10px 14px;background:#2563eb;color:white;font-weight:950;box-shadow:0 4px 0 rgba(0,0,0,.28);cursor:pointer}.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.28)}.btn.secondary{background:#475569}.btn.good{background:#16a34a}.btn.warn{background:#d97706}.btn.bad{background:#dc2626}.hint{color:var(--muted);font-size:14px;line-height:1.45}.screen{background:rgba(255,255,255,.06);border-radius:18px;border:1px solid rgba(255,255,255,.11);overflow:hidden;position:relative}canvas{display:block;width:100%;height:auto;background:#0b1220;border-radius:18px}.controls{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px}.ctrl{min-width:58px;min-height:50px;border:0;border-radius:16px;background:rgba(255,255,255,.15);color:#fff;font-size:22px;font-weight:1000}.overlay{position:absolute;inset:12px;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.78);backdrop-filter:blur(6px);border-radius:18px;z-index:10}.card{width:min(94%,600px);padding:22px;background:#101827;border:1px solid rgba(255,255,255,.16);border-radius:24px;text-align:center}.card h2{margin:0 0 8px;font-size:clamp(24px,6vw,40px)}.row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}.grid{display:grid;gap:8px}.choice{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.10);color:white;border-radius:16px;padding:12px;font-weight:950;font-size:18px}.choice:active,.choice:hover{background:rgba(56,189,248,.35)}.tiny{font-size:12px;color:#94a3b8}.soundbar{position:fixed;right:12px;bottom:12px;z-index:30}.soundbtn{border:1px solid rgba(255,255,255,.18);background:rgba(15,23,42,.84);color:white;border-radius:999px;padding:10px 12px;font-weight:950;box-shadow:0 8px 28px rgba(0,0,0,.35)}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(15,23,42,.94);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:9px 14px;font-weight:900;z-index:50;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;bottom:28px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.10);font-size:12px;font-weight:950}.meter{height:12px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}.meter>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#38bdf8,#f59e0b)}
@media(max-width:640px){body{padding:0}.panel{border-radius:0;min-height:100vh}.game{min-height:calc(100vh - 74px);padding:8px}.top{padding:10px}.ctrl{min-width:62px;min-height:54px}.btn{padding:11px 13px}.hint{font-size:13px}.soundbar{right:8px;bottom:8px}.pill{font-size:13px;padding:6px 8px}}


.map{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;max-width:720px;margin:10px auto}.spot{min-height:84px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;text-align:center;font-weight:950;padding:6px}.spot.done{background:rgba(34,197,94,.25)}.spot.now{background:rgba(56,189,248,.30);box-shadow:0 0 0 3px rgba(56,189,248,.25)}.quizbox{max-width:760px;margin:10px auto;background:rgba(255,255,255,.08);border-radius:20px;padding:16px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}@media(max-width:640px){.choices{grid-template-columns:1fr}.map{grid-template-columns:repeat(3,1fr)}}

<div class="wrap"><div class="panel"><div class="top"><div class="title">🗺️ 여수 역사 탐험대</div><div class="row"><span class="pill">탐험 <b id="pos">1</b>/10</span><span class="pill">보석 <b id="gem">0</b></span><span class="pill">❤️ <b id="hp">3</b></span><span class="pill">힌트 <b id="hint">2</b></span></div></div><div class="game"><div class="hud"><button class="btn good" onclick="start()">탐험 시작</button><button class="btn warn" onclick="useHint()">힌트 사용</button><button class="btn warn" onclick="useShield()">방패 3보석</button><span class="hint">지역 역사와 가치 교육을 담은 탐험 퀴즈입니다. 보물상자·힌트·방패·연속정답 보너스가 있습니다.</span></div><div id="map" class="map"></div><div class="quizbox"><h2 id="q">문제가 여기에 나옵니다.</h2><div id="choices" class="choices"></div><p id="fb" class="hint"></p></div><div id="over" class="overlay"><div class="card"><h2>여수 역사 탐험 출발!</h2><p class="hint">정답을 맞히며 10개의 탐험 지점을 지나 보물을 모으세요.</p><button class="btn good" onclick="start()">게임 시작</button></div></div></div></div></div>
<div class="soundbar"><button id="soundToggle" class="soundbtn" onclick="Sound.toggle()">🔊 사운드 켜짐</button></div><script>
const Sound=(()=>{let ctx=null,muted=false,bgm=null,step=0,style=0,tempo=330;const scales=[[262,330,392,523,392,330,294,392],[220,277,330,440,330,277,247,330],[196,294,349,392,523,392,349,294],[330,392,494,659,587,494,392,330]];function ensure(){const AC=window.AudioContext||window.webkitAudioContext;if(!AC){muted=true;return} if(!ctx){try{ctx=new AC()}catch(e){muted=true;return}} if(ctx&&ctx.state==='suspended'){const p=ctx.resume(); if(p&&p.catch)p.catch(()=>{})}}function tone(f=440,d=.08,type='sine',gain=.05,when=0){if(muted)return;ensure();let o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.setValueAtTime(f,ctx.currentTime+when);g.gain.setValueAtTime(0.0001,ctx.currentTime+when);g.gain.exponentialRampToValueAtTime(gain,ctx.currentTime+when+.01);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+when+d);o.connect(g).connect(ctx.destination);o.start(ctx.currentTime+when);o.stop(ctx.currentTime+when+d+.03)}function noise(d=.12,gain=.05){if(muted)return;ensure();let len=Math.max(1,Math.floor(ctx.sampleRate*d)),buf=ctx.createBuffer(1,len,ctx.sampleRate),data=buf.getChannelData(0);for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);let src=ctx.createBufferSource(),g=ctx.createGain();g.gain.value=gain;src.buffer=buf;src.connect(g).connect(ctx.destination);src.start()}function sfx(name){if(muted)return;ensure();const map={good:[523,659,784],bad:[180,120],hit:[140,90],coin:[880,1175],power:[392,523,659,1046],level:[330,415,523,659,880],click:[430],pop:[650,860],drop:[110,150],win:[523,659,784,1046],lose:[240,180,120],quiz:[494,587],shield:[294,392,494],bomb:[90,70,55]};let arr=map[name]||map.click;arr.forEach((f,i)=>tone(f,.07+i*.01,i%2?'triangle':'square',.045,i*.055));if(name==='bomb'||name==='hit'||name==='bad')noise(.16,.035)}function start(s=0,t=330){style=s;tempo=t;if(bgm)clearInterval(bgm);ensure();step=0;bgm=setInterval(()=>{if(muted)return;let sc=scales[style%scales.length];let f=sc[step%sc.length];tone(f,.11,'triangle',.022);if(step%4===0)tone(f/2,.16,'sine',.018);step++},tempo)}function stop(){if(bgm){clearInterval(bgm);bgm=null}}function toggle(){muted=!muted;let b=document.getElementById('soundToggle');if(b)b.textContent=muted?'🔇 사운드 꺼짐':'🔊 사운드 켜짐';if(!muted)ensure()}return{ensure,tone,sfx,start,stop,toggle,get muted(){return muted}}})();
window.Sound = Sound;
function toast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.classList.remove('show'),1300)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function rand(a,b){return Math.random()*(b-a)+a} function randi(a,b){return Math.floor(rand(a,b+1))} function pick(a){return a[Math.floor(Math.random()*a.length)]}
window.addEventListener('pointerdown',()=>Sound.ensure(),{once:true});


const qs=[['이순신 장군이 나라를 지키기 위해 보여 준 대표 가치는?',['의로움과 책임','낭비와 욕심','무관심','포기'],'의로움과 책임'],['지역 역사 공부를 할 때 중요한 태도는?',['사실을 확인하고 존중하기','마음대로 꾸며 말하기','친구 의견 무시하기','기록을 보지 않기'],'사실을 확인하고 존중하기'],['여수의 이야기를 글과 노래로 만드는 활동은 어떤 힘을 기를까?',['표현력과 공동체 의식','잠자는 힘','게임 실력만','암기만'],'표현력과 공동체 의식'],['어려운 역사를 배울 때 필요한 마음은?',['공감과 평화의 마음','놀림','분노만 하기','잊어버리기'],'공감과 평화의 마음'],['글로컬이란 말과 가장 가까운 뜻은?',['지역에서 세계로 연결','교실에만 있기','혼자만 알기','공부 안 하기'],'지역에서 세계로 연결'],['친구의 작품 발표를 들을 때 좋은 태도는?',['경청하고 따뜻하게 피드백','비웃기','딴청 피우기','비교만 하기'],'경청하고 따뜻하게 피드백'],['역사 탐방 후 기록하면 좋은 것은?',['보고 느낀 점과 새롭게 알게 된 점','점심 메뉴만','장난친 일만','아무것도 없음'],'보고 느낀 점과 새롭게 알게 된 점'],['지역을 사랑하는 학생의 모습은?',['배우고 알리고 실천함','무관심함','훼손함','놀리기만 함'],'배우고 알리고 실천함'],['디지털 도구로 지역 이야기를 만들 때 중요한 것은?',['저작권과 예의를 지키기','무단 복사하기','출처 지우기','거짓 정보 쓰기'],'저작권과 예의를 지키기'],['탐험대의 마지막 미션은?',['배운 가치를 생활 속에서 실천','책 덮고 끝내기','친구 탓하기','혼자만 알기'],'배운 가치를 생활 속에서 실천']];let idx=0,gemN=0,hpN=3,hintN=2,shield=false,streak=0,order=[];
function start(){Sound.start(2,340);idx=0;gemN=0;hpN=YS_easyLives(3);hintN=4;shield=false;streak=0;order=qs.slice().sort(()=>Math.random()-.5);over.style.display='none';renderMap();showQ();hud()}
function hud(){pos.textContent=idx+1;gem.textContent=gemN;hp.textContent=hpN;hint.textContent=hintN}
function renderMap(){map.innerHTML='';for(let i=0;i<10;i++){let d=document.createElement('div');d.className='spot '+(i<idx?'done':i===idx?'now':'');d.innerHTML=i<idx?'✅':i===idx?'🚩<br>현재':'❔';map.appendChild(d)}}
function showQ(){let cur=order[idx];q.textContent=`탐험 문제 ${idx+1}. ${cur[0]}`;choices.innerHTML='';YS_limitChoices(cur[1].slice().sort(()=>Math.random()-.5), cur[2]).forEach(a=>{let b=document.createElement('button');b.className='choice';b.textContent=a;b.onclick=()=>answer(a);choices.appendChild(b)});fb.textContent= idx===4?'보물상자가 가까워졌습니다. 연속 정답을 노려보세요!':'';hud();renderMap()}
function answer(a){let cur=order[idx];if(a===cur[2]){streak++;let gain=1+(streak>=3?1:0)+(Math.random()<.18?2:0);gemN+=gain;Sound.sfx(streak%3===0?'level':'good');fb.textContent=`정답! 보석 ${gain}개 획득. 연속 ${streak}회`;idx++;if(idx>=10)return win();setTimeout(showQ,700)}else{streak=0;if(shield){shield=false;Sound.sfx('shield');fb.textContent='방패가 실수를 막아 주었습니다.'}else{hpN=YS_miss(hpN);Sound.sfx('bad');fb.textContent='아쉬워요. 다시 생각해 봅시다.';if(hpN<=0)return lose()}}hud()}
function useHint(){if(hintN<=0){toast('힌트가 없어요');return}hintN--;let cur=order[idx];fb.textContent=`힌트: 정답은 ‘${cur[2].slice(0,4)}...’로 시작합니다.`;Sound.sfx('quiz');hud()}
function useShield(){if(gemN>=3){gemN-=3;shield=true;Sound.sfx('shield');toast('방패 장착!')}else toast('보석이 부족해요');hud()}
function win(){Sound.sfx('win');over.style.display='flex';over.querySelector('h2').textContent=`탐험 성공! 보석 ${gemN}개`;}
function lose(){Sound.sfx('lose');over.style.display='flex';over.querySelector('h2').textContent='탐험 종료! 다시 도전해요';}


(function(){
  const GAME_FILE = "07_yeosu_history_expedition_items.html";
  const GAME_META = ['지역 역사와 가치 판단', '힌트 없이 5문제 연속 정답', '인물·사건·가치를 연결하면 역사 지식이 이야기처럼 기억됨', '여수 탐험가'];
  const BEST_KEY = 'ys_edu_game_best_v2_' + GAME_FILE;
  function safeNum(text){ const m=String(text||'').replace(/,/g,'').match(/-?\d+/); return m?Number(m[0]):0; }
  function safeGet(key){ try{return localStorage.getItem(key)}catch(e){return null} }
  function safeSet(key,val){ try{localStorage.setItem(key,val)}catch(e){} }
  function rank(best){ if(best>=1200)return '🏆 '+GAME_META[3]; if(best>=600)return '⭐ 성장왕'; if(best>=250)return '🔥 도전자'; return '🌱 연습생'; }
  function init(){
    const game=document.querySelector('.game')||document.body;
    const hud=document.querySelector('.hud')||game;
    if(!document.querySelector('.eduBox')){
      const box=document.createElement('section'); box.className='eduBox';
      box.innerHTML=`<div class="eduItem"><b>🎯 학습 목표</b><span>${GAME_META[0]}</span></div><div class="eduItem"><b>🎮 오늘의 도전</b><span>${GAME_META[1]}</span></div><div class="eduItem"><b>💡 배움 팁</b><span>${GAME_META[2]}</span></div>`;
      hud.insertAdjacentElement('afterend',box);
      const tools=document.createElement('div'); tools.className='miniTool';
      tools.innerHTML=`<button class="miniBtn" id="miniSoundTest">🎵 소리 테스트</button><button class="miniBtn" id="miniFull">📱 전체화면</button><button class="miniBtn" id="miniResetBest">🏅 최고점 초기화</button><button class="miniBtn" id="miniTeacher">👩‍🏫 수업 활용</button><a class="miniBtn" href="../learning-games-all/index.html" style="text-decoration:none">🏠 100게임 메인보드</a><a class="miniBtn" href="https://ysschool.vercel.app/" style="text-decoration:none">🏫 엽쌤스쿨 홈</a>`;
      box.insertAdjacentElement('afterend',tools);
      const note=document.createElement('div'); note.className='teacherNote'; note.id='teacherNote';
      note.textContent='수업 활용: 3분 플레이 → 짝과 전략 설명 → 틀린 문제 또는 헷갈린 개념 1개를 공책에 적기 순서로 운영하면 게임성과 학습 정리가 함께 살아납니다.';
      tools.insertAdjacentElement('afterend',note);
    }
    const topRow=document.querySelector('.top .row')||document.querySelector('.top')||document.body;
    let best=safeNum(safeGet(BEST_KEY));
    const bestChip=document.createElement('span'); bestChip.className='pill bestPill'; bestChip.innerHTML=`🏅 최고 <b id="bestScoreV2">${best}</b>`; topRow.appendChild(bestChip);
    const rankChip=document.createElement('span'); rankChip.className='pill rankPill'; rankChip.innerHTML=`칭호 <b id="rankV2">${rank(best)}</b>`; topRow.appendChild(rankChip);
    const scoreEl=document.getElementById('score');
    function updateBest(){ if(!scoreEl)return; const now=safeNum(scoreEl.textContent); if(now>best){ best=now; safeSet(BEST_KEY,String(best)); const b=document.getElementById('bestScoreV2'); if(b)b.textContent=best; const r=document.getElementById('rankV2'); if(r)r.textContent=rank(best); if(window.toast)toast('신기록 달성! 🏅'); if(window.Sound&&Sound.sfx)Sound.sfx('level'); }}
    if(scoreEl && window.MutationObserver){ new MutationObserver(updateBest).observe(scoreEl,{childList:true,characterData:true,subtree:true}); } else { setInterval(updateBest,800); }
    const st=document.getElementById('miniSoundTest'); if(st)st.onclick=()=>{ if(window.Sound){Sound.ensure();Sound.sfx('good');Sound.sfx('coin');toast&&toast('소리 정상 작동!');} };
    const fs=document.getElementById('miniFull'); if(fs)fs.onclick=()=>{ const el=document.documentElement; if(el.requestFullscreen)el.requestFullscreen().catch(()=>{}); if(window.Sound)Sound.sfx('click'); };
    const rb=document.getElementById('miniResetBest'); if(rb)rb.onclick=()=>{ best=0; safeSet(BEST_KEY,'0'); const b=document.getElementById('bestScoreV2'); if(b)b.textContent='0'; const r=document.getElementById('rankV2'); if(r)r.textContent=rank(0); if(window.Sound)Sound.sfx('click'); if(window.toast)toast('최고점 초기화 완료'); };
    const tb=document.getElementById('miniTeacher'); if(tb)tb.onclick=()=>{ const n=document.getElementById('teacherNote'); if(n)n.classList.toggle('show'); if(window.Sound)Sound.sfx('quiz'); };
  }
  window.addEventListener('error',function(e){
    if(document.querySelector('.errorBox'))return;
    const d=document.createElement('div'); d.className='errorBox';
    d.textContent='게임 실행 중 오류가 감지되었습니다. 새로고침 후 다시 시작해 주세요. 오류: '+(e.message||'알 수 없음');
    document.body.appendChild(d);
  });
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
})();


(function(){
  const file = (location.pathname.split('/').pop() || document.title || 'game').replace(/[^\w가-힣.-]/g,'_');
  const LOG_KEY = 'ys_edu_game_learning_log_v3_' + file;
  const missions = [
    '오늘은 정답을 고르기 전에 이유를 한 문장으로 말하기',
    '친구에게 내가 쓴 전략 하나 설명하기',
    '틀린 문제나 헷갈린 개념을 1개만 기록하기',
    '3분 동안 포기하지 않고 다시 도전하기',
    '점수보다 정확도와 차분한 판단을 목표로 하기',
    '게임 후 오늘 배운 낱말·공식·개념을 2개 적기'
  ];
  function $(id){return document.getElementById(id)}
  function safeGet(k){try{return localStorage.getItem(k)||''}catch(e){return ''}}
  function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
  function say(msg){ if(window.toast) toast(msg); else console.log(msg); }
  function ensureTools(){
    const anchor=document.querySelector('.teacherNote') || document.querySelector('.miniTool') || document.querySelector('.eduBox') || document.querySelector('.game') || document.body;
    if(!document.getElementById('v3Tools')){
      const tools=document.createElement('div'); tools.className='miniTool'; tools.id='v3Tools';
      tools.innerHTML='<button class="miniBtn" id="v3MissionBtn">🎲 미션 뽑기</button><button class="miniBtn" id="v3LogBtn">📝 배움 기록장</button><button class="miniBtn" id="v3FiveBtn">⏱️ 5분 집중</button><button class="miniBtn" id="v3ClassBtn">🖥️ 수업 모드</button><button class="miniBtn" id="v3MotionBtn">🪶 저사양 모드</button><span class="v3Timer" id="v3Timer" style="display:none">⏱️ 05:00</span>';
      anchor.insertAdjacentElement('afterend',tools);
      const panel=document.createElement('section'); panel.className='v3Panel'; panel.id='v3Panel';
      panel.innerHTML='<div class="v3Mission" id="v3Mission">🎯 미션을 뽑아 보세요.</div><div><b>📝 오늘의 배움 기록</b><br><span class="hint">게임을 마친 뒤 알게 된 점, 헷갈린 점, 다음 목표를 적어 두면 수업 후 정리에 좋습니다.</span><textarea id="v3Log" placeholder="예: 분수는 분모와 분자를 같은 수로 나누어도 크기가 같다는 것을 알았다."></textarea><div class="row" style="margin-top:8px"><button class="btn good" id="v3SaveLog">기록 저장</button><button class="btn secondary" id="v3ClearLog">기록 지우기</button></div><div class="v3Safety"><b>점검 메모</b> 모든 파일은 단일 HTML로 실행되며, 외부 음원·이미지 없이 작동하도록 구성되어 있습니다.</div></div>';
      tools.insertAdjacentElement('afterend',panel);
    }
    const log=$('v3Log'); if(log) log.value=safeGet(LOG_KEY);
    const mission=$('v3Mission');
    $('v3MissionBtn').onclick=()=>{ const m=missions[Math.floor(Math.random()*missions.length)]; if(mission) mission.textContent='🎯 '+m; if(window.Sound)Sound.sfx('quiz'); say('오늘의 미션이 정해졌어요!'); };
    $('v3LogBtn').onclick=()=>{ $('v3Panel').classList.toggle('show'); if(window.Sound)Sound.sfx('click'); };
    $('v3SaveLog').onclick=()=>{ safeSet(LOG_KEY, $('v3Log').value.trim()); if(window.Sound)Sound.sfx('good'); say('배움 기록 저장 완료'); };
    $('v3ClearLog').onclick=()=>{ $('v3Log').value=''; safeSet(LOG_KEY,''); if(window.Sound)Sound.sfx('click'); say('배움 기록을 비웠어요'); };
    $('v3ClassBtn').onclick=()=>{ document.body.classList.toggle('classMode'); if(window.Sound)Sound.sfx('power'); say(document.body.classList.contains('classMode')?'수업 모드 ON':'수업 모드 OFF'); };
    $('v3MotionBtn').onclick=()=>{ document.body.classList.toggle('lowMotion'); if(window.Sound)Sound.sfx('click'); say(document.body.classList.contains('lowMotion')?'저사양 모드 ON':'저사양 모드 OFF'); };
    let timer=null, left=0;
    function drawTime(){ const t=$('v3Timer'); if(!t)return; const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0'); t.textContent='⏱️ '+m+':'+s; t.style.display='inline-flex'; }
    $('v3FiveBtn').onclick=()=>{ clearInterval(timer); left=300; drawTime(); if(window.Sound)Sound.sfx('level'); say('5분 집중 도전 시작!'); timer=setInterval(()=>{left--; drawTime(); if(left<=0){clearInterval(timer); if(window.Sound)Sound.sfx('win'); say('5분 집중 도전 완료! 배움 기록을 남겨 보세요.');}},1000); };
  }
  const prevOnError = window.onerror;
  window.onerror=function(msg,src,line,col,err){
    try{console.error('Game error captured:',msg,src,line,col,err); const box=document.querySelector('.errorBox'); if(box) box.textContent='게임 실행 중 오류가 감지되었습니다. 새로고침 후 다시 시작해 주세요. 오류: '+msg;}catch(e){}
    if(typeof prevOnError==='function')return prevOnError.apply(this,arguments);
    return false;
  };
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',ensureTools); else ensureTools();
})();
